version: '3.8'

services:
  crossy:
    image: crossy:latest
    container_name: crossy_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:80'
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
    networks:
      - crossy_net

networks:
  crossy_net:
    driver: bridge
